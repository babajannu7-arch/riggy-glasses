<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mr. Riggy</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
          --bg:        #2B2D2F;
          --panel:     #2B2D2F;
          --card:      #1A1D20;
          --border:    #2E3235;
          --border2:   #1E2428;
          --sand:      #C4B697;
          --sand-dim:  #7A6E57;
          --silver:    #B8BEC4;
          --silver-dim:#6E7478;
          --slate:     #3D5060;
          --slate-dim: #3D5060;
          --text:      #A8ADB2;
          --green:     #5EA87A;
          --red:       #CC4444;
        }

        html, body {
          width: 100%; height: 100%;
          background: var(--bg);
          overflow: hidden;
          font-family: 'Share Tech Mono', monospace;
          color: var(--text);
        }

        body {
          display: flex;
          flex-direction: column;
          align-items: center;
          padding: 44px 22px 28px;
          position: relative;
        }

        /* Scanline retro overlay */
        body::before {
          content: '';
          position: fixed;
          inset: 0;
          background: repeating-linear-gradient(
            0deg,
            transparent,
            transparent 2px,
            rgba(0,0,0,0.06) 2px,
            rgba(0,0,0,0.06) 4px
          );
          pointer-events: none;
          z-index: 50;
        }

        /* Vignette */
        body::after {
          content: '';
          position: fixed;
          inset: 0;
          background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.4) 100%);
          pointer-events: none;
          z-index: 1;
        }

        /* Corner brackets */
        .corner {
          position: fixed;
          width: 20px; height: 20px;
          z-index: 20; opacity: 0.3;
          transition: opacity 0.4s;
        }
        .corner-tl { top: 14px; left: 14px; border-top: 1px solid var(--sand); border-left: 1px solid var(--sand); }
        .corner-tr { top: 14px; right: 14px; border-top: 1px solid var(--sand); border-right: 1px solid var(--sand); }
        .corner-bl { bottom: 14px; left: 14px; border-bottom: 1px solid var(--sand); border-left: 1px solid var(--sand); }
        .corner-br { bottom: 14px; right: 14px; border-bottom: 1px solid var(--sand); border-right: 1px solid var(--sand); }
        body.speaking .corner { opacity: 0.6; }
        body.live .corner { opacity: 0.5; border-color: var(--green); }

        /* HEADER */
        .header {
          width: 100%;
          display: flex;
          flex-direction: column;
          align-items: center;
          z-index: 10;
          margin-bottom: 6px;
        }

        .brand {
          font-family: 'Orbitron', sans-serif;
          font-weight: 900;
          font-size: 26px;
          letter-spacing: 10px;
          color: var(--silver);
          text-align: center;
          text-shadow: 0 0 20px rgba(61,80,96,0.5);
        }

        .brand-sub {
          font-family: 'VT323', monospace;
          font-size: 14px;
          letter-spacing: 5px;
          color: var(--sand-dim);
          opacity: 0.7;
          text-align: center;
          margin-top: 2px;
          text-transform: uppercase;
        }

        /* Status pill */
        .status-pill {
          display: flex;
          align-items: center;
          gap: 8px;
          background: rgba(94,168,122,0.08);
          border: 1px solid rgba(94,168,122,0.2);
          border-radius: 30px;
          padding: 5px 14px;
          margin-top: 10px;
          transition: all 0.4s ease;
        }
        .status-pill.speaking {
          background: rgba(196,182,151,0.08);
          border-color: rgba(196,182,151,0.25);
        }
        .status-pill.live {
          background: rgba(94,168,122,0.12);
          border-color: rgba(94,168,122,0.4);
        }

        .status-dot {
          width: 8px; height: 8px;
          border-radius: 50%;
          background: var(--green);
          box-shadow: 0 0 8px var(--green);
          animation: dot-breathe 2s ease-in-out infinite;
          transition: all 0.4s ease;
        }
        .status-pill.speaking .status-dot {
          background: var(--sand);
          box-shadow: 0 0 8px var(--sand);
          animation: dot-flash 0.5s ease-in-out infinite alternate;
        }
        .status-pill.live .status-dot {
          background: var(--green);
          box-shadow: 0 0 12px var(--green), 0 0 24px var(--green);
          animation: dot-flash 0.8s ease-in-out infinite alternate;
        }

        @keyframes dot-breathe {
          0%, 100% { opacity: 0.6; transform: scale(1); }
          50% { opacity: 1; transform: scale(1.2); }
        }
        @keyframes dot-flash {
          from { opacity: 0.7; transform: scale(1); }
          to { opacity: 1; transform: scale(1.3); }
        }

        .status-text {
          font-family: 'VT323', monospace;
          font-size: 15px;
          letter-spacing: 3px;
          color: var(--green);
          text-transform: uppercase;
          transition: color 0.4s ease;
        }
        .status-pill.speaking .status-text { color: var(--sand); }
        .status-pill.live .status-text { color: var(--green); }

        /* ORB SECTION */
        .orb-section {
          flex: 1;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          position: relative;
          z-index: 5;
          width: 100%;
        }

        .orb-wrap {
          position: relative;
          width: 220px; height: 220px;
          display: flex;
          align-items: center;
          justify-content: center;
        }

        .ring {
          position: absolute;
          border-radius: 50%;
        }

        .ring-1 {
          width: 220px; height: 220px;
          border: 1px solid rgba(61,80,96,0.35);
          animation: spin 20s linear infinite;
          transition: border-color 0.5s, box-shadow 0.5s;
        }
        .ring-1::before {
          content: '';
          position: absolute;
          top: -4px; left: 50%;
          width: 8px; height: 8px;
          background: var(--slate);
          border-radius: 50%;
          box-shadow: 0 0 10px var(--slate), 0 0 20px var(--slate);
          transform: translateX(-50%);
        }

        .ring-2 {
          width: 168px; height: 168px;
          border: 1px solid rgba(196,182,151,0.2);
          animation: spin 13s linear infinite reverse;
          transition: border-color 0.5s;
        }
        .ring-2::before {
          content: '';
          position: absolute;
          bottom: -3px; left: 50%;
          width: 6px; height: 6px;
          background: var(--sand);
          border-radius: 50%;
          box-shadow: 0 0 8px var(--sand), 0 0 16px var(--sand);
          transform: translateX(-50%);
        }

        .ring-3 {
          width: 118px; height: 118px;
          border: 1px solid rgba(184,190,196,0.1);
          animation: spin 9s linear infinite;
        }

        body.speaking .ring-1 {
          border-color: rgba(61,80,96,0.6);
          box-shadow: 0 0 20px rgba(61,80,96,0.15);
        }
        body.speaking .ring-2 {
          border-color: rgba(196,182,151,0.45);
          box-shadow: 0 0 15px rgba(196,182,151,0.1);
        }
        body.live .ring-1 {
          border-color: rgba(94,168,122,0.4);
          box-shadow: 0 0 20px rgba(94,168,122,0.1);
        }

        @keyframes spin {
          from { transform: rotate(0deg); }
          to { transform: rotate(360deg); }
        }

        .orb-core {
          width: 68px; height: 68px;
          border-radius: 50%;
          background: radial-gradient(circle, rgba(61,80,96,0.15) 0%, transparent 70%);
          box-shadow: 0 0 20px rgba(61,80,96,0.1);
          transition: all 0.5s ease;
        }
        body.speaking .orb-core {
          background: radial-gradient(circle, rgba(196,182,151,0.2) 0%, rgba(61,80,96,0.1) 50%, transparent 100%);
          box-shadow: 0 0 30px rgba(196,182,151,0.2), 0 0 60px rgba(61,80,96,0.1);
          animation: core-pulse 0.9s ease-in-out infinite alternate;
        }
        body.live .orb-core {
          background: radial-gradient(circle, rgba(94,168,122,0.2) 0%, rgba(61,80,96,0.1) 50%, transparent 100%);
          box-shadow: 0 0 30px rgba(94,168,122,0.2);
          animation: core-pulse 1.5s ease-in-out infinite alternate;
        }

        @keyframes core-pulse {
          from { transform: scale(1); }
          to { transform: scale(1.12); }
        }

        /* VOICE WAVE — replaces particles */
        .voice-wave {
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 4px;
          height: 48px;
          margin-top: 20px;
          width: 200px;
        }

        .bar {
          width: 3px;
          border-radius: 3px;
          background: linear-gradient(to top, var(--sand-dim), var(--slate));
          height: 4px;
          opacity: 0.25;
          transition: opacity 0.3s ease;
        }

        body.speaking .bar {
          opacity: 1;
          background: linear-gradient(to top, var(--sand), var(--silver));
          animation: bar-wave 0.5s ease-in-out infinite alternate;
        }

        body.live .bar {
          opacity: 0.6;
          background: linear-gradient(to top, var(--green), var(--slate));
          animation: bar-idle 2s ease-in-out infinite alternate;
        }

        .bar:nth-child(1)  { animation-delay: 0.00s; }
        .bar:nth-child(2)  { animation-delay: 0.04s; }
        .bar:nth-child(3)  { animation-delay: 0.08s; }
        .bar:nth-child(4)  { animation-delay: 0.12s; }
        .bar:nth-child(5)  { animation-delay: 0.16s; }
        .bar:nth-child(6)  { animation-delay: 0.20s; }
        .bar:nth-child(7)  { animation-delay: 0.24s; }
        .bar:nth-child(8)  { animation-delay: 0.20s; }
        .bar:nth-child(9)  { animation-delay: 0.16s; }
        .bar:nth-child(10) { animation-delay: 0.12s; }
        .bar:nth-child(11) { animation-delay: 0.08s; }
        .bar:nth-child(12) { animation-delay: 0.04s; }
        .bar:nth-child(13) { animation-delay: 0.00s; }

        @keyframes bar-wave {
          from { height: 4px; }
          to { height: 42px; }
        }

        @keyframes bar-idle {
          from { height: 4px; }
          to { height: 12px; }
        }

        .state-label {
          font-family: 'VT323', monospace;
          font-size: 13px;
          letter-spacing: 4px;
          color: var(--slate-dim);
          text-transform: uppercase;
          margin-top: 8px;
          transition: all 0.4s ease;
        }
        body.speaking .state-label { color: var(--sand); text-shadow: 0 0 8px rgba(196,182,151,0.3); }
        body.live .state-label { color: var(--green); text-shadow: 0 0 8px rgba(94,168,122,0.3); }

        /* LIVE BUTTON */
        .live-btn {
          margin-top: 14px;
          padding: 10px 28px;
          font-family: 'VT323', monospace;
          font-size: 16px;
          letter-spacing: 4px;
          text-transform: uppercase;
          border-radius: 30px;
          cursor: pointer;
          transition: all 0.3s ease;
          z-index: 10;
          border: 1px solid rgba(94,168,122,0.3);
          background: rgba(94,168,122,0.08);
          color: var(--green);
        }
        .live-btn:active { transform: scale(0.96); }
        .live-btn.active {
          background: rgba(94,168,122,0.15);
          border-color: rgba(94,168,122,0.6);
          box-shadow: 0 0 16px rgba(94,168,122,0.2);
          color: var(--green);
        }

        /* RESPONSE CARDS */
        .response-section {
          width: 100%;
          z-index: 10;
          display: flex;
          flex-direction: column;
          gap: 8px;
          margin-top: 14px;
        }

        .card {
          background: var(--card);
          border-radius: 4px;
          padding: 11px 15px;
          border: 1px solid var(--border);
          position: relative;
          overflow: hidden;
        }
        .card::before {
          content: '';
          position: absolute;
          left: 0; top: 0; bottom: 0;
          width: 2px;
        }
        .card.user::before { background: var(--slate); opacity: 0.6; }
        .card.riggy::before { background: var(--sand); opacity: 0.7; }

        .card-label {
          font-family: 'VT323', monospace;
          font-size: 11px;
          letter-spacing: 3px;
          text-transform: uppercase;
          margin-bottom: 4px;
        }
        .card.user .card-label { color: var(--silver-dim); }
        .card.riggy .card-label { color: var(--sand-dim); }

        .card-text {
          font-family: 'Share Tech Mono', monospace;
          font-size: 13px;
          line-height: 1.5;
          color: var(--text);
          opacity: 0.8;
          min-height: 18px;
          max-height: 80px;
          overflow-y: auto;
        }
        .card.user .card-text { opacity: 0.45; font-size: 12px; }

        .fade-in {
          animation: fadeUp 0.3s ease forwards;
        }
        @keyframes fadeUp {
          from { opacity: 0; transform: translateY(4px); }
          to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div class="header">
    <div class="brand">MR. RIGGY</div>
    <div class="brand-sub">Private Digital Assistant</div>
    <div class="status-pill" id="statusPill">
        <div class="status-dot"></div>
        <span class="status-text" id="statusText">Online</span>
    </div>
</div>

<div class="orb-section">
    <div class="orb-wrap">
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        <div class="ring ring-3"></div>
        <div class="orb-core"></div>
    </div>

    <div class="voice-wave">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div>
    </div>

    <div class="state-label" id="stateLabel">Standby</div>

    <button class="live-btn" id="liveBtn" onclick="toggleLive()">Go Live</button>
</div>

<div class="response-section">
    <div class="card user">
        <div class="card-label">You said</div>
        <div class="card-text" id="userText">Waiting for your voice...</div>
    </div>
    <div class="card riggy">
        <div class="card-label">Mr. Riggy</div>
        <div class="card-text" id="riggyText">Online and ready, friend.</div>
    </div>
</div>

<script>
    const pill = document.getElementById('statusPill');
    const statusText = document.getElementById('statusText');
    const stateLabel = document.getElementById('stateLabel');
    const riggyText = document.getElementById('riggyText');
    const userText = document.getElementById('userText');
    const liveBtn = document.getElementById('liveBtn');

    let speakTimer = null;
    let lastRiggy = '';
    let lastUser = '';
    let isLive = false;
    let lastLiveState = false;

    async function toggleLive() {
      try {
        const res = await fetch('/toggle-live', { method: 'POST' });
        const data = await res.json();
        isLive = data.live;
        updateLiveUI();
      } catch(e) {}
    }

    function updateLiveUI() {
      if (isLive) {
        document.body.classList.add('live');
        document.body.classList.remove('speaking');
        pill.classList.add('live');
        pill.classList.remove('speaking');
        statusText.textContent = 'Live';
        stateLabel.textContent = 'Listening Live';
        liveBtn.textContent = 'Stop Live';
        liveBtn.classList.add('active');
      } else {
        document.body.classList.remove('live');
        pill.classList.remove('live');
        statusText.textContent = 'Online';
        stateLabel.textContent = 'Standby';
        liveBtn.textContent = 'Go Live';
        liveBtn.classList.remove('active');
      }
    }

    function setSpeaking(on) {
      if (isLive) return;
      if (on) {
        document.body.classList.add('speaking');
        pill.classList.add('speaking');
        statusText.textContent = 'Speaking';
        stateLabel.textContent = 'Transmitting';
      } else {
        document.body.classList.remove('speaking');
        pill.classList.remove('speaking');
        statusText.textContent = 'Online';
        stateLabel.textContent = 'Listening';
      }
    }

    async function pollUpdates() {
      try {
        const res = await fetch('/webview-state');
        if (res.ok) {
          const data = await res.json();

          // Sync live state from server
          if (data.liveMode !== undefined && data.liveMode !== isLive) {
            isLive = data.liveMode;
            updateLiveUI();
          }

          if (data.userSaid && data.userSaid !== lastUser) {
            lastUser = data.userSaid;
            userText.textContent = data.userSaid;
            userText.classList.remove('fade-in');
            void userText.offsetWidth;
            userText.classList.add('fade-in');
          }
          if (data.riggySaid && data.riggySaid !== lastRiggy) {
            lastRiggy = data.riggySaid;
            riggyText.textContent = data.riggySaid;
            riggyText.classList.remove('fade-in');
            void riggyText.offsetWidth;
            riggyText.classList.add('fade-in');
            if (!isLive) {
              setSpeaking(true);
              if (speakTimer) clearTimeout(speakTimer);
              speakTimer = setTimeout(() => setSpeaking(false), Math.max(2500, data.riggySaid.length * 55));
            }
          }
        }
      } catch(e) {}
      setTimeout(pollUpdates, 1200);
    }

    setSpeaking(false);
    pollUpdates();
</script>
</body>
</html>
